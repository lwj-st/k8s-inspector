name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -e .[dev]

      - name: Run backend tests
        working-directory: backend
        run: pytest -v

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/k8s-inspector -f deploy/helm/k8s-inspector/ci-values.yaml

  kk-e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    needs: test-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.11

      - name: Build e2e image
        run: docker build -t k8s-inspector:e2e .

      - name: Export image tarball
        run: docker save k8s-inspector:e2e -o /tmp/k8s-inspector-e2e.tar

      - name: Install KubeKey dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y socat conntrack

      - name: Install KubeKey
        run: curl -sfL https://get-kk.kubesphere.io | sh -

      - name: Create single-node cluster with kk
        run: |
          set -o pipefail
          chmod +x ./kk
          ./kk version
          if ! (echo yes | sudo -E ./kk create cluster --with-kubernetes v1.31.11 \
            --set kubernetes.control_plane_endpoint.host=127.0.0.1 \
            --set kubernetes.control_plane_endpoint.local.address=127.0.0.1 \
            2>&1 | tee /tmp/kk-create.log); then
            tail -n 50 /tmp/kk-create.log | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g' | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi

      - name: Prepare kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          sudo cp /etc/kubernetes/admin.conf "$HOME/.kube/config"
          sudo chown "$USER":"$USER" "$HOME/.kube/config"
          kubectl get nodes -o wide

      - name: Import image into cluster runtime
        run: sudo ctr -n k8s.io images import /tmp/k8s-inspector-e2e.tar

      - name: Deploy chart to kk cluster
        run: |
          helm upgrade --install e2e ./deploy/helm/k8s-inspector \
            --namespace k8s-inspector \
            --create-namespace \
            -f ./deploy/helm/k8s-inspector/e2e-values.yaml
          kubectl rollout status deployment/e2e-k8s-inspector --namespace k8s-inspector --timeout=10m

      - name: Verify service endpoints
        run: |
          kubectl get pods -n k8s-inspector
          kubectl get svc -n k8s-inspector
          kubectl port-forward -n k8s-inspector svc/e2e-k8s-inspector 18080:80 >/tmp/k8s-inspector-port-forward.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/api/v1/system/status >/tmp/system-status.json; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:18080/ >/tmp/index.html
          grep -q '"status":"ready"' /tmp/system-status.json
          grep -q 'K8s Inspector' /tmp/index.html

      - name: Run helm test
        run: helm test e2e --namespace k8s-inspector --timeout 5m

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get all -A || true
          kubectl describe pods -n k8s-inspector || true
          kubectl logs -n k8s-inspector deployment/e2e-k8s-inspector || true
          if [ -f /tmp/kk-create.log ]; then
            tail -n 200 /tmp/kk-create.log || true
          fi
