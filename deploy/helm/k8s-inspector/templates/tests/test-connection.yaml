apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "k8s-inspector.fullname" . }}-test-connection"
  labels:
    {{- include "k8s-inspector.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
        - -qO-
        - http://{{ include "k8s-inspector.fullname" . }}:{{ .Values.service.port }}{{ include "k8s-inspector.systemStatusPath" . }}
