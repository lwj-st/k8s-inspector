image:
  repository: docker.io/library/k8s-inspector
  tag: e2e
  pullPolicy: Never

ingress:
  enabled: false

env:
  databaseUrl: sqlite:////tmp/k8s_inspector.db
  providerMode: kubernetes
  preferIncluster: true

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
